<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер ФСУ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 24px; text-align: center; color: #2c3e50; }
        
        /* Панель музики */
        .music-panel {
            width: 100%;
            max-width: 480px;
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .music-controls { display: flex; align-items: center; gap: 8px; }
        .music-btn { background: #3498db; padding: 6px 12px; font-size: 14px; border-radius: 5px; border: none; color: white; cursor: pointer; }
        .music-btn:hover { background: #2980b9; }
        .music-select { padding: 6px; border-radius: 5px; border: none; background: #34495e; color: white; outline: none; cursor: pointer; }
        .volume-slider { width: 70px; cursor: pointer; }

        .container { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .task-type { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; font-weight: bold; }
        .progress { font-size: 14px; font-weight: bold; color: #3498db; }
        .question-box { font-size: 28px; font-weight: bold; text-align: center; margin: 25px 0; font-family: 'Cambria', 'Georgia', serif; color: #2c3e50; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        label { font-size: 14px; color: #7f8c8d; font-weight: 600; }
        input[type="text"] { width: 100%; padding: 12px 15px; font-size: 18px; border: 2px solid #bdc3c7; border-radius: 8px; outline: none; transition: border-color 0.2s; font-family: 'Cambria', 'Georgia', serif; }
        input[type="text"]:focus { border-color: #3498db; }
        
        button { width: 100%; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-bottom: 10px; }
        button:active { transform: scale(0.99); }
        .btn-check { background: #2ecc71; margin-bottom: 15px; }
        .btn-check:hover { background: #27ae60; }

        .nav-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn-nav { background: #34495e; margin-bottom: 0; }
        .btn-nav:hover { background: #2c3e50; }
        .btn-nav:disabled { background: #bdc3c7; cursor: not-allowed; }

        .result-box { display: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 16px; line-height: 1.5; }
        .result-box.success { display: block; background: #e8f8f5; border-left: 5px solid #2ecc71; color: #27ae60; }
        .result-box.error { display: block; background: #fdedec; border-left: 5px solid #e74c3c; color: #c0392b; }
        .expected-text { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <h1>Тренажер: Скорочене множення</h1>

    <div class="music-panel">
        <div class="music-controls">
            <button class="music-btn" id="play-btn" onclick="toggleMusic()">🎵 Грати музику</button>
            <select class="music-select" id="track-select" onchange="changeTrack()">
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Lofi Track 1</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Ambient Track 2</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">Retro Track 3</option>
            </select>
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <span>🔊</span>
            <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.1" value="0.4" oninput="setVolume()">
        </div>
    </div>

    <div class="container">
        <div class="header-panel">
            <div class="task-type" id="task-type">Завдання</div>
            <div class="progress" id="progress">1 / 20</div>
        </div>

        <div class="question-box" id="question">Приклад</div>

        <div class="input-group">
            <label for="user-answer">Введіть вашу відповідь:</label>
            <input type="text" id="user-answer" placeholder="Вводь відповідь як на листку..." autocomplete="off">
        </div>

        <button class="btn-check" onclick="checkAnswer()">Перевірити</button>

        <div class="result-box" id="result-box">
            <strong id="result-status"></strong>
            <div class="expected-text" id="expected-text"></div>
        </div>

        <div class="nav-box">
            <button class="btn-nav" id="btn-prev" onclick="prevTrack()">← Назад</button>
            <button class="btn-nav" id="btn-next" onclick="nextTrack()">Вперед →</button>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <script>
        // База данных ответов точно по твоему листку
        const examples = [
            { type: "Розкласти", q: "a² - 36", a: "(a-6)(a+6)" },
            { type: "Розкласти", q: "x² + 6x + 9", a: "(x+3)²" },
            { type: "Спростити", q: "(x + 2)² - x²", a: "x²+4x+4-x²=4x+4=4(x+1)" },
            { type: "Розкласти", q: "y² - 49", a: "(y-7)(y+7)" },
            { type: "Спростити", q: "(a - b)² + 2ab", a: "a²-2ab-b²+2ab=a²-b²=(a-b)(a+b)" },
            { type: "Розкласти", q: "x² - 9", a: "(x-3)(x+3)" },
            { type: "Розкласти", q: "x² + 10x + 25", a: "(x+5)²" },
            { type: "Спростити", q: "(3x - 2)² - 9x² + 12x - 4", a: "9x²-4-9x²+12x-4=12x-8" },
            { type: "Розкласти", q: "a² - b²", a: "(a-b)(a+b)" },
            { type: "Розкласти", q: "x² - 4x + 4", a: "(x-2)²" },
            { type: "Спростити", q: "(x - 5)² - (x + 5)²", a: "x²-10x+25-(x²+10x+25)=x²-10x+25-x²-10x-25=-20x" },
            { type: "Розкласти", q: "25x² - 4", a: "(5x-2)(5x+2)" },
            { type: "Розкласти", q: "x² + 2x + 1", a: "(x+1)²" },
            { type: "Розкласти", q: "16a² - 81b²", a: "(4a-9b)(4a+9b)" },
            { type: "Спростити", q: "(2a + 3b)² - (2a - 3b)²", a: "4a²+12ab+9b²-(4a²-12ab+9b²)=4a²+12ab+9b²-4a²+12ab-9b²=24ab" },
            { type: "Розкласти", q: "49 - y²", a: "(7-y)(7+y)" },
            { type: "Розкласти", q: "x² + 18x + 81", a: "(x+9)²" },
            { type: "Спростити", q: "(x + 1)² - (x - 1)²", a: "x²+2x+1-(x²-2x+1)=x²+2x+1-x²+2x-1=4x" },
            { type: "Розкласти", q: "4x² - 25", a: "(2x-5)(2x-5)" },
            { type: "Спростити", q: "(x + y)² + (x - y)²", a: "x²+2xy+y²+x²-2xy+y²=2x²+2y²=2(x²+y²)" }
        ];

        let currentIndex = 0;
        const resBox = document.getElementById('result-box');
        const resStatus = document.getElementById('result-status');
        const expText = document.getElementById('expected-text');
        const inputField = document.getElementById('user-answer');
        
        const audio = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        const trackSelect = document.getElementById('track-select');

        // Очистка строки
        function cleanString(str) {
            if (!str) return "";
            return str.toString()
                .replace(/\s+/g, '')
                .toLowerCase()
                .replace(/·/g, '*')
                .replace(/x2/g, 'x²').replace(/a2/g, 'a²').replace(/b2/g, 'b²').replace(/y2/g, 'y²')
                .replace(/x\^2/g, 'x²').replace(/a\^2/g, 'a²').replace(/b\^2/g, 'b²').replace(/y\^2/g, 'y²');
        }

        function updateCard() {
            resBox.style.display = "none";
            inputField.value = "";

            const current = examples[currentIndex];
            document.getElementById('task-type').innerText = current.type;
            document.getElementById('question').innerText = current.q;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${examples.length}`;
            
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === examples.length - 1;
            inputField.focus();
        }

        function checkAnswer() {
            const current = examples[currentIndex];
            const userClean = cleanString(inputField.value);
            const correctClean = cleanString(current.a);

            resBox.style.display = "block";
            if (userClean === correctClean) {
                resBox.className = "result-box success";
                resStatus.innerText = "Вітаю!";
                expText.innerText = "Правильно! Відповідь повністю правильна.";
            } else {
                resBox.className = "result-box error";
                resStatus.innerText = "Помилка!";
                // Показываем точный формат строки, чтобы исправить опечатку
                expText.innerHTML = `Перевір знаки або дужки. Очікуваний формат запису:<br><strong>${current.a}</strong>`;
            }
        }

        function nextTrack() {
            if (currentIndex < examples.length - 1) { currentIndex++; updateCard(); }
        }

        function prevTrack() {
            if (currentIndex > 0) { currentIndex--; updateCard(); }
        }

        function toggleMusic() {
            if (!audio.src) { audio.src = trackSelect.value; }
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = "⏸ Пауза";
                }).catch(e => {
                    alert("Клацни спочатку мишкою по сторінці, а потім запускай музику!");
                });
            } else {
                audio.pause();
                playBtn.innerText = "🎵 Грати музику";
            }
        }

        function changeTrack() {
            const wasPlaying = !audio.paused;
            audio.src = trackSelect.value;
            if (wasPlaying) { audio.play(); }
        }

        function setVolume() {
            audio.volume = document.getElementById('volume').value;
        }

        inputField.addEventListener("keyup", function(event) {
            if (event.key === "Enter") { checkAnswer(); }
        });

        updateCard();
    </script>
</body>
</html>
