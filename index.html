<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер: Формули скороченого множення</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
            color: #2c3e50;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Стили для анимации переворота карточки */
        .card-scene {
            width: 100%;
            height: 220px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card-front {
            background: #ffffff;
            border: 2px solid #3498db;
        }

        .card-back {
            background: #3498db;
            color: white;
            transform: rotateY(180deg);
        }

        .task-type {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .card-back .task-type {
            color: #e0f2fe;
        }

        .math-expr {
            font-size: 26px;
            font-weight: bold;
            font-family: 'Cambria', 'Georgia', serif;
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            user-select: none;
        }

        button:hover {
            background: #27ae60;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-nav {
            background: #34495e;
            padding: 12px 15px;
        }

        .btn-nav:hover {
            background: #2c3e50;
        }

        .btn-nav:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .progress {
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>Тренажер: Скорочене множення</h1>

    <div class="container">
        <div class="card-scene">
            <div class="card" id="card" onclick="toggleFlip()">
                <div class="card-face card-front">
                    <div class="task-type" id="task-type">Завдання</div>
                    <div class="math-expr" id="question">Приклад</div>
                </div>
                <div class="card-face card-back">
                    <div class="task-type">Правильна відповідь</div>
                    <div class="math-expr" id="answer">Відповідь</div>
                </div>
            </div>
        </div>

        <button style="width: 100%; margin-bottom: 20px;" onclick="toggleFlip()">Показати відповідь</button>

        <div class="controls">
            <button class="btn-nav" id="btn-prev" onclick="prevTrack()">← Назад</button>
            <span class="progress" id="progress">1 / 20</span>
            <button class="btn-nav" id="btn-next" onclick="nextTrack()">Вперед →</button>
        </div>
    </div>

    <script>
        // Массив со всеми 20 примерами из твоего файла
        const examples = [
            { type: "Розкласти", q: "a² - 36", a: "(a - 6)(a + 6)" }, // [cite: 2]
            { type: "Розкласти", q: "x² + 6x + 9", a: "(x + 3)²" }, // [cite: 3]
            { type: "Спростити", q: "(x + 2)² - x²", a: "4x + 4" }, // [cite: 4]
            { type: "Розкласти", q: "y² - 49", a: "(y - 7)(y + 7)" }, // [cite: 5]
            { type: "Спростити", q: "(a - b)² + 2ab", a: "a² + b²" }, // [cite: 6]
            { type: "Розкласти", q: "x² - 9", a: "(x - 3)(x + 3)" }, // [cite: 7]
            { type: "Розкласти", q: "x² + 10x + 25", a: "(x + 5)²" }, // [cite: 8]
            { type: "Спростити", q: "(3x - 2)² - 9x² + 12x - 4", a: "0" }, // [cite: 9]
            { type: "Розкласти", q: "a² - b²", a: "(a - b)(a + b)" }, // [cite: 10]
            { type: "Розкласти", q: "x² - 4x + 4", a: "(x - 2)²" }, // [cite: 11]
            { type: "Спростити", q: "(x - 5)² - (x + 5)²", a: "-20x" }, // [cite: 12]
            { type: "Розкласти", q: "25x² - 4", a: "(5x - 2)(5x + 2)" }, // [cite: 13]
            { type: "Розкласти", q: "x² + 2x + 1", a: "(x + 1)²" }, // [cite: 14]
            { type: "Розкласти", q: "16a² - 81b²", a: "(4a - 9b)(4a + 9b)" }, // [cite: 15]
            { type: "Спростити", q: "(2a + 3b)² - (2a - 3b)²", a: "24ab" }, // [cite: 16]
            { type: "Розкласти", q: "49 - y²", a: "(7 - y)(7 + y)" }, // [cite: 17]
            { type: "Розкласти", q: "x² + 18x + 81", a: "(x + 9)²" }, // [cite: 18]
            { type: "Спростити", q: "(x + 1)² - (x - 1)²", a: "4x" }, // [cite: 19]
            { type: "Розкласти", q: "4x² - 25", a: "(2x - 5)(2x + 5)" }, // [cite: 20]
            { type: "Спростити", q: "(x + y)² + (x - y)²", a: "2x² + 2y²" } // [cite: 21]
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');

        // Функция обновления данных на карточке
        function updateCard() {
            // Сначала возвращаем карточку в исходное (не перевернутое) состояние
            card.classList.remove('is-flipped');
            
            // Ждем анимацию возврата, прежде чем менять текст
            setTimeout(() => {
                const current = examples[currentIndex];
                document.getElementById('task-type').innerText = current.type;
                document.getElementById('question').innerText = current.q;
                document.getElementById('answer').innerText = current.a;
                document.getElementById('progress').innerText = `${currentIndex + 1} / ${examples.length}`;
                
                // Блокировка кнопок на границах массива
                document.getElementById('btn-prev').disabled = currentIndex === 0;
                document.getElementById('btn-next').disabled = currentIndex === examples.length - 1;
            }, 150); 
        }

        // Функция переворота карточки
        function toggleFlip() {
            card.classList.toggle('is-flipped');
        }

        // Кнопка Вперед
        function nextTrack() {
            if (currentIndex < examples.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        // Кнопка Назад
        function prevTrack() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Инициализация первой карточки при загрузке
        updateCard();
    </script>
</body>
</html>
